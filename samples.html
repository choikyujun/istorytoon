<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iStoryToon - 스타일 비교</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F0F8FF; color: #0F1923; font-family: -apple-system, sans-serif; padding: 32px 16px; }
  h1 { text-align: center; font-size: 24px; font-weight: 900; margin-bottom: 6px;
    background: linear-gradient(135deg, #38A8F5, #7C3AED); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { text-align: center; color: #5A7A93; font-size: 13px; margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 960px; margin: 0 auto; }
  .card { background: white; border: 1.5px solid rgba(56,152,236,0.2); border-radius: 16px; overflow: hidden;
    box-shadow: 0 4px 16px rgba(56,152,236,0.08); }
  .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
  .card-info { padding: 14px; }
  .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 8px; }
  .b1 { background: #EEF0FF; color: #5A6ED4; }
  .b2 { background: #EBF5FF; color: #1A7FD4; }
  .b3 { background: #FFF0F8; color: #D45A8A; }
  .b4 { background: #F0FFF4; color: #1A7A5A; }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .card-desc { font-size: 12px; color: #7A9AB3; }
  @media(max-width:600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <h1>🌸 iStoryToon 스타일 비교</h1>
  <p class="sub">FLUX.1-schnell 모델 · 동일 스토리로 스타일만 다르게 생성</p>
  <div class="grid">
    <div class="card">
      <img src="https://replicate.delivery/xezq/PV59G6U0mZY4DJZf2SiucWEw1E81gj5OU2zTuMJ3fl4cyijWA/out_0.webp" alt="순정만화" onerror="this.style.background='#E8F0FF';this.alt='💜 순정만화';">
      <div class="card-info">
        <span class="badge b1">💜 순정만화 스타일</span>
        <div class="card-title">첫 만남 — 카페</div>
        <div class="card-desc">소프트 파스텔, 반짝이 하트, Studio Ghibli 감성</div>
      </div>
    </div>
    <div class="card">
      <img src="https://replicate.delivery/xezq/igWpuNmnrRaEKBDIlk" alt="웹툰" onerror="this.style.background='#EBF5FF';this.alt='🟦 웹툰';">
      <div class="card-info">
        <span class="badge b2">🟦 웹툰 스타일</span>
        <div class="card-title">첫 만남 — 카페</div>
        <div class="card-desc">굵은 라인, 선명한 색감, 한국 웹툰 감성</div>
      </div>
    </div>
    <div class="card">
      <img src="https://replicate.delivery/xezq/nqr3GvW51aryP5kQpA" alt="디즈니" onerror="this.style.background='#FFF0F8';this.alt='🏰 디즈니';">
      <div class="card-info">
        <span class="badge b3">🏰 디즈니/픽사 스타일</span>
        <div class="card-title">행복한 가족</div>
        <div class="card-desc">따뜻한 조명, 픽사 3D 입체감</div>
      </div>
    </div>
    <div class="card">
      <img src="https://replicate.delivery/xezq/fuJIc5IJiFyhNS0GM5" alt="육아" onerror="this.style.background='#F0FFF4';this.alt='👶 육아';">
      <div class="card-info">
        <span class="badge b4">👶 따뜻한 육아 스토리</span>
        <div class="card-title">아기 첫 걸음마</div>
        <div class="card-desc">황금빛 따뜻한 조명, 큰 눈의 귀여운 아기</div>
      </div>
    </div>
  </div>
</body>
</html>
